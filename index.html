<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Royale UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#0b0f2a,#05060f);
overflow:hidden;
color:#fff;
}

/* particles */
.particles{position:absolute;inset:0;z-index:0;}
.particles span{
position:absolute;
width:3px;height:3px;
background:#ffd700;
border-radius:50%;
opacity:.6;
animation:float 10s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.container{
position:relative;
z-index:2;
text-align:center;
width:100%;
max-width:420px;
padding:20px;
}

/* logo */
.logo{
width:150px;height:150px;margin:auto;
border-radius:20px;
background:rgba(0,0,0,.7);
display:flex;justify-content:center;align-items:center;
border:1px solid rgba(255,215,0,.4);
box-shadow:0 0 40px rgba(255,215,0,.2);
}

/* title */
.title{
margin-top:15px;
font-size:32px;
font-weight:800;
color:#ffd700;
text-shadow:0 0 20px #ffcc00;
}

/* input */
input{
width:100%;
padding:14px;
margin-top:20px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,.08);
color:#fff;
border:1px solid rgba(255,255,255,.1);
}

button{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffcc00,#ff6600);
color:#000;
font-weight:700;
cursor:pointer;
}

/* step2 */
.step2{display:none;margin-top:20px;}

.platforms{
display:flex;
gap:10px;
margin-top:10px;
}

.platforms button{
flex:1;
background:rgba(255,255,255,.08);
color:#fff;
border:1px solid rgba(255,255,255,.2);
}

.platforms button.active{
background:linear-gradient(90deg,#ffcc00,#ff6600);
color:#000;
}

/* footer */
.footer{
position:absolute;
bottom:12px;
width:100%;
text-align:center;
z-index:2;
}

.social{
display:flex;
justify-content:center;
gap:12px;
}

.social a{
width:38px;height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,215,0,.2);
color:#fff;
transition:.3s;
text-decoration:none;
}

.social a:hover{
transform:translateY(-4px);
border-color:#ffd700;
color:#ffd700;
}

.footer-text{
margin-top:8px;
font-size:11px;
opacity:.7;
color:#ffd700;
letter-spacing:1px;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="container">

<div class="logo">
<svg width="120" height="120" viewBox="0 0 200 200">
<rect width="200" height="200" rx="25" fill="#000"/>
<text x="100" y="85" text-anchor="middle" fill="#fff" font-size="40" font-weight="900">SUPER</text>
<text x="100" y="135" text-anchor="middle" fill="#fff" font-size="40" font-weight="900">CELL</text>
</svg>
</div>

<div class="title">CLASH ROYALE</div>

<input type="text" placeholder="Enter your name">

<button onclick="start()">Continue</button>

<div class="step2" id="step2">
<div>Choose Platform</div>

<div class="platforms">
<button onclick="select(this)">Android</button>
<button onclick="select(this)">iOS</button>
</div>

<button onclick="openModal()">Continue</button>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
<div class="social">
<a href="#"><i class="fab fa-facebook-f"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-discord"></i></a>
</div>
<div class="footer-text">Supercell 2026 © All Rights Reserved</div>
</div>

<script>
// particles
const p=document.getElementById("particles");
for(let i=0;i<50;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(Math.random()*5+5)+"s";
p.appendChild(s);
}

let selected=false;

function start(){
document.getElementById("step2").style.display="block";
}

function select(btn){
document.querySelectorAll(".platforms button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selected=true;
}

function openModal(){
if(!selected){
alert("Choose platform first");
return;
}
alert("Loading completed UI...");
}
</script>

</body>
</html>
