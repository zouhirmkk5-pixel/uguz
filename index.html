<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Loading</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#0b0f2a,#05060f);
overflow:hidden;
color:#fff;
}

.particles{position:absolute;inset:0;z-index:0;overflow:hidden;}
.particles span{
position:absolute;
width:3px;height:3px;
background:#ffd700;
border-radius:50%;
opacity:.6;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.container{
position:relative;
z-index:2;
text-align:center;
width:100%;
max-width:420px;
padding:20px;
}

.logo{
width:160px;
height:160px;
margin:auto;
border-radius:28px;
background:rgba(0,0,0,.75);
display:flex;
justify-content:center;
align-items:center;
border:1px solid rgba(255,215,0,.45);
box-shadow:0 0 45px rgba(255,215,0,.28);
backdrop-filter:blur(10px);
}

.logo-inner{animation:popGlow 2s infinite alternate;}
@keyframes popGlow{from{transform:scale(1);}to{transform:scale(1.08);}}

.title{
margin-top:15px;
font-size:32px;
font-weight:800;
color:#ffd700;
text-shadow:0 0 20px #ffcc00;
}

.stats{
margin-top:20px;
display:flex;
gap:10px;
}

.card{
flex:1;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,215,0,.2);
border-radius:12px;
padding:12px;
backdrop-filter:blur(10px);
}

.num{font-size:20px;font-weight:800;color:#ffd700;}
.label{font-size:11px;opacity:.8;margin-top:5px;}

.inputBox{margin-top:20px;}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,.08);
color:#fff;
border:1px solid rgba(255,255,255,.1);
}

button{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffcc00,#ff6600);
color:#000;
font-weight:700;
cursor:pointer;
}

.step2{display:none;margin-top:20px;}

.platforms{
display:flex;
gap:10px;
margin-top:10px;
}

.platforms button{
flex:1;
background:rgba(255,255,255,.08);
color:#fff;
border:1px solid rgba(255,255,255,.2);
}

.platforms button.active{
background:linear-gradient(90deg,#ffcc00,#ff6600);
color:#000;
font-weight:800;
transform:scale(1.05);
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
}

.social{
margin-top:18px;
display:flex;
justify-content:center;
gap:15px;
}

.social a{
width:42px;height:42px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
color:#fff;
text-decoration:none;
transition:.3s;
}

.social a:hover{
transform:translateY(-4px);
border-color:#ffd700;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="container">

<div class="logo">
<div class="logo-inner">
<svg width="125" height="125" viewBox="0 0 200 200">
<rect width="200" height="200" rx="28" fill="#000"/>

<text x="100" y="82" text-anchor="middle"
fill="#fff" font-size="42" font-weight="900"
font-family="Arial Black">SUPER</text>

<text x="100" y="138" text-anchor="middle"
fill="#fff" font-size="42" font-weight="900"
font-family="Arial Black">CELL</text>
</svg>
</div>
</div>

<div class="title">CLASH ROYALE</div>

<div class="stats">
<div class="card"><div class="num" id="chests">0</div><div class="label">Chests Today</div></div>
<div class="card"><div class="num" id="online">0</div><div class="label">Online Players</div></div>
</div>

<div class="inputBox" id="step1">
<input type="text" placeholder="Enter your name">
<button onclick="startGame()">Continue</button>
</div>

<div class="step2" id="step2">
<div>Choose Platform</div>

<div class="platforms">
<button onclick="selectPlatform('Android')">Android</button>
<button onclick="selectPlatform('iOS')">iOS</button>
</div>

<div class="actions">
<button onclick="easyStep()">Easy Step</button>
<button onclick="fastStep()">Fast Step</button>
</div>
</div>

</div>

<script>

// particles
const particles=document.getElementById("particles");
for(let i=0;i<60;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(Math.random()*5+5)+"s";
particles.appendChild(s);
}

// stats
let c=0,o=40;

setInterval(()=>{
if(c<230){
c+=Math.floor(Math.random()*7)+1;
document.getElementById("chests").innerText=c;
}
},50);

setInterval(()=>{
o+=(Math.random()<0.5?1:-1);
o=Math.max(25,Math.min(78,o));
document.getElementById("online").innerText=o;
},1200);

// logic
let selectedPlatform=null;

function startGame(){
document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";
}

function selectPlatform(p){
selectedPlatform=p;

document.querySelectorAll(".platforms button").forEach(b=>b.classList.remove("active"));

if(p==="Android"){
document.querySelectorAll(".platforms button")[0].classList.add("active");
}else{
document.querySelectorAll(".platforms button")[1].classList.add("active");
}
}

// 🔥 LINK FUNCTION
function goLink(){
window.location.href="https://checkmyapp.store/cl/i/n66xj9";
}

function easyStep(){
if(!selectedPlatform){
alert("Choose Android or iOS first");
return;
}
goLink();
}

function fastStep(){
if(!selectedPlatform){
alert("Choose Android or iOS first");
return;
}
goLink();
}

</script>

</body>
</html>
