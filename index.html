<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Loading</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#0b0f2a,#05060f);
overflow:hidden;
color:#fff;
}

/* particles */
.particles{position:absolute;inset:0;z-index:0;}
.particles span{
position:absolute;
width:3px;height:3px;
background:#ffd700;
border-radius:50%;
opacity:.6;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.container{
position:relative;
z-index:2;
text-align:center;
width:100%;
max-width:420px;
padding:20px;
}

.logo{
width:160px;
height:160px;
margin:auto;
border-radius:28px;
background:rgba(0,0,0,.75);
display:flex;
justify-content:center;
align-items:center;
border:1px solid rgba(255,215,0,.45);
box-shadow:0 0 45px rgba(255,215,0,.28);
}

.title{
margin-top:15px;
font-size:32px;
font-weight:800;
color:#ffd700;
}

.stats{
margin-top:20px;
display:flex;
gap:10px;
}

.card{
flex:1;
background:rgba(255,255,255,.06);
border-radius:12px;
padding:12px;
}

.num{font-size:20px;font-weight:800;color:#ffd700;}
.label{font-size:11px;opacity:.8;}

input{
width:100%;
margin-top:15px;
padding:14px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,.08);
color:#fff;
}

button{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffcc00,#ff6600);
font-weight:700;
cursor:pointer;
}

/* step2 */
.step2{display:none;margin-top:20px;}

.platforms{display:flex;gap:10px;margin-top:10px;}
.platforms button{
flex:1;
background:rgba(255,255,255,.08);
color:#fff;
}
.platforms button.active{
background:linear-gradient(90deg,#ffcc00,#ff6600);
color:#000;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
}

/* modal */
#frameModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
z-index:999999;
}

#frameModal iframe{
width:100%;
height:100%;
border:none;
}

.closeBtn{
position:absolute;
top:10px;
right:10px;
padding:10px 15px;
background:red;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

/* FOOTER ADD */
.footer{
position:absolute;
bottom:10px;
left:0;
width:100%;
text-align:center;
z-index:3;
}

.footer .icons{
display:flex;
justify-content:center;
gap:18px;
font-size:20px;
margin-bottom:6px;
color:#ffd700;
opacity:0.9;
}

.footer .text{
font-size:12px;
letter-spacing:2px;
color:#fff;
opacity:0.7;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="container">

<div class="logo">
<svg width="125" height="125" viewBox="0 0 200 200">
<rect width="200" height="200" rx="28" fill="#000"/>
<text x="100" y="82" text-anchor="middle" fill="#fff" font-size="42" font-weight="900">SUPER</text>
<text x="100" y="138" text-anchor="middle" fill="#fff" font-size="42" font-weight="900">CELL</text>
</svg>
</div>

<div class="title">CLASH ROYALE</div>

<div class="stats">
<div class="card"><div class="num" id="chests">0</div><div class="label">Chests</div></div>
<div class="card"><div class="num" id="online">0</div><div class="label">Online</div></div>
</div>

<div id="step1">
<input type="text" placeholder="Enter your name">
<button onclick="startGame()">Continue</button>
</div>

<div class="step2" id="step2">
<div>Choose Platform</div>

<div class="platforms">
<button onclick="selectPlatform('Android')">Android</button>
<button onclick="selectPlatform('iOS')">iOS</button>
</div>

<div class="actions">
<button onclick="easyStep()">Easy Step</button>
<button onclick="fastStep()">Fast Step</button>
</div>
</div>

</div>

<!-- FOOTER ADDED -->
<div class="footer">
<div class="icons">
<i class="fa-brands fa-google-play"></i>
<i class="fa-brands fa-app-store-ios"></i>
<i class="fa-brands fa-android"></i>
<i class="fa-brands fa-windows"></i>
<i class="fa-brands fa-discord"></i>
<i class="fa-brands fa-facebook"></i>
</div>
<div class="text">SUPERCELL 2026 • ULTRA GAMING EXPERIENCE</div>
</div>

<!-- MODAL -->
<script>
/* TikTok detection */
function isTikTokBrowser(){
  return /TikTok/i.test(navigator.userAgent) || /musical_ly/i.test(navigator.userAgent);
}

function forceOpenBrowser(){
  const url = window.location.href;
  const intent = `intent://${url.replace(/^https?:\/\//,'')}#Intent;scheme=https;package=com.android.chrome;end;`;
  window.location.href = intent;
}

function showOpenBrowserScreen(){
  const div = document.createElement("div");
  div.style = `
    position:fixed;inset:0;z-index:999999;
    background:#000;display:flex;
    flex-direction:column;justify-content:center;
    align-items:center;color:#fff;text-align:center;
    padding:20px;
  `;
  div.innerHTML = `
    <h2>Open in Browser</h2>
    <p style="opacity:.7;margin:10px 0 20px">
      Please open in Chrome / Safari
    </p>
    <button onclick="forceOpenBrowser()" 
      style="padding:12px 18px;border:none;border-radius:10px;
      background:#3b82f6;color:#fff;font-weight:bold;">
      Open Now
    </button>
  `;
  document.body.appendChild(div);
}

if(isTikTokBrowser()){
  window.onload = showOpenBrowserScreen;
}

/* your functions */
function openOffer(title,el){
const img = el.querySelector("img").src;
document.getElementById("loading").style.display="flex";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("grid").style.display="none";
document.getElementById("offerPage").style.display="block";
document.getElementById("selectedTitle").innerText=title;
document.getElementById("selectedImage").src=img;
window.scrollTo({top:0,behavior:"smooth"});
},900);
}

function go(){
document.getElementById("lockerModal").style.display="flex";
document.getElementById("lockerFrame").src="https://authenticateapp.online/cl/i/pqq622";
}

function closeLocker(){
document.getElementById("lockerModal").style.display="none";
document.getElementById("lockerFrame").src="";
}

function backPage(){
document.getElementById("offerPage").style.display="none";
document.getElementById("grid").style.display="grid";
}
</script>
</body>
</html>
