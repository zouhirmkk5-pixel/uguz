<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#0b0f2a,#05060f);
color:#fff;
overflow:hidden;
}

.container{
text-align:center;
max-width:420px;
width:100%;
padding:20px;
}

/* title */
.title{
font-size:32px;
font-weight:800;
color:#ffd700;
text-shadow:0 0 20px #ffcc00;
}

/* buttons */
button{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffd700,#ff9900);
color:#000;
font-weight:800;
cursor:pointer;
}

/* step2 */
.step2{display:none;margin-top:20px;}

.platforms{display:flex;gap:10px;margin-top:10px;}

.platforms button{
flex:1;
background:rgba(255,255,255,.08);
color:#fff;
border:1px solid rgba(255,255,255,.2);
}

.platforms button.active{
background:linear-gradient(90deg,#ffd700,#ff9900);
color:#000;
}

/* loading */
#loading{
display:none;
margin-top:20px;
}

.bar{
width:100%;
background:#222;
border-radius:10px;
margin-top:10px;
}

.bar-inner{
height:10px;
width:0%;
background:#ffd700;
border-radius:10px;
}

/* locker */
#locker{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.locker-box{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:350px;
}

.offer{
background:#1f2937;
margin-top:10px;
padding:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

<div class="title">CLASH ROYALE</div>

<!-- STEP 1 -->
<div id="step1">
<input type="text" placeholder="Enter your name" style="width:100%;padding:12px;border-radius:10px;margin-top:20px;">
<button onclick="start()">Continue</button>
</div>

<!-- STEP 2 -->
<div class="step2" id="step2">

<div style="margin-top:15px;">Select your device to continue</div>

<div class="platforms">
<button onclick="selectPlatform('Android')">Android</button>
<button onclick="selectPlatform('iOS')">iOS</button>
</div>

<button onclick="startProcess()">Secure Access</button>
<button onclick="startProcess()">Instant Access</button>

</div>

<!-- LOADING -->
<div id="loading">
<div>Connecting to servers...</div>

<div class="bar">
<div class="bar-inner" id="bar"></div>
</div>

<div id="status" style="margin-top:10px;font-size:12px;">Verifying...</div>
</div>

</div>

<!-- LOCKER -->
<div id="locker">
<div class="locker-box">

<h3>Complete One Step</h3>

<div class="offer">
<span>Verification</span>
<button onclick="go()">Start</button>
</div>

<div class="offer">
<span>Quick Access</span>
<button onclick="go()">Start</button>
</div>

<div style="margin-top:10px;font-size:11px;opacity:.7;">
Secure connection • Verified system
</div>

</div>
</div>

<script>

let selected=null;

function start(){
document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";
}

function selectPlatform(p){
selected=p;
document.querySelectorAll(".platforms button").forEach(b=>b.classList.remove("active"));
if(p==="Android"){
document.querySelectorAll(".platforms button")[0].classList.add("active");
}else{
document.querySelectorAll(".platforms button")[1].classList.add("active");
}
}

function startProcess(){

if(!selected){
alert("Select device first");
return;
}

document.getElementById("step2").style.display="none";
document.getElementById("loading").style.display="block";

let width=0;
let texts=["Connecting...","Checking account...","Verifying data...","Preparing rewards..."];
let i=0;

let interval=setInterval(()=>{
width+=5;
document.getElementById("bar").style.width=width+"%";

if(width%25===0 && i<texts.length){
document.getElementById("status").innerText=texts[i];
i++;
}

if(width>=100){
clearInterval(interval);
document.getElementById("loading").style.display="none";
document.getElementById("locker").style.display="flex";
}

},120);
}

function go(){
window.location.href="https://checkmyapp.store/cl/i/n66xj9";
}

</script>

</body>
</html>
